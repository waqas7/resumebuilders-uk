<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b4b"/>
      <stop offset="0.5" stop-color="#312e81"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="120" r="200" fill="#7c3aed" opacity="0.15"/>
  <circle cx="1050" cy="500" r="160" fill="#2563eb" opacity="0.12"/>

  <!-- Copy -->
  <text x="80" y="180" fill="white" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800">Build ATS-Friendly</text>
  <text x="80" y="250" fill="white" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800">Resumes in Seconds</text>
  <text x="80" y="310" fill="#a78bfa" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">with AI</text>
  <text x="80" y="370" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22">Resume Builder &amp; CV Maker App · UK</text>

  <!-- Desktop mockup -->
  <rect x="520" y="80" width="620" height="380" rx="16" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
  <rect x="520" y="80" width="620" height="32" rx="16" fill="#09090b"/>
  <circle cx="544" cy="96" r="6" fill="#ef4444"/>
  <circle cx="564" cy="96" r="6" fill="#fbbf24"/>
  <circle cx="584" cy="96" r="6" fill="#22c55e"/>
  <rect x="540" y="130" width="580" height="310" rx="8" fill="#f4f4f5"/>

  <!-- Resume preview in mockup -->
  <rect x="560" y="150" width="180" height="260" rx="4" fill="#047857"/>
  <text x="580" y="190" fill="white" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Emma Richardson</text>
  <text x="580" y="210" fill="#d1fae5" font-family="Inter, Arial, sans-serif" font-size="10">Marketing Manager</text>
  <rect x="760" y="150" width="340" height="260" rx="4" fill="white"/>
  <text x="780" y="180" fill="#18181b" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">EXPERIENCE</text>
  <rect x="780" y="190" width="280" height="8" rx="2" fill="#e4e4e7"/>
  <rect x="780" y="206" width="240" height="8" rx="2" fill="#e4e4e7"/>
  <rect x="780" y="230" width="200" height="8" rx="2" fill="#e4e4e7"/>
  <rect x="780" y="260" width="80" height="20" rx="10" fill="#dcfce7"/>
  <text x="790" y="274" fill="#16a34a" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="600">ATS 94%</text>

  <!-- Phone mockup -->
  <rect x="620" y="480" width="140" height="120" rx="20" fill="#18181b" stroke="#52525b" stroke-width="2"/>
  <rect x="630" y="492" width="120" height="96" rx="12" fill="white"/>
  <rect x="640" y="502" width="100" height="6" rx="2" fill="#7c3aed" opacity="0.4"/>
  <rect x="640" y="516" width="100" height="4" rx="1" fill="#e4e4e7"/>
  <rect x="640" y="526" width="80" height="4" rx="1" fill="#e4e4e7"/>

  <!-- Badge -->
  <rect x="80" y="420" width="280" height="48" rx="24" fill="url(#accent)"/>
  <text x="220" y="451" text-anchor="middle" fill="white" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Free on Google Play</text>
</svg>
